name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Assemble publish directory
        run: |
          mkdir -p dist
          # Only ship the runtime web app — not docs/, supabase/, .github/ or .git/
          cp index.html manifest.json sw.js _headers _redirects dist/
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: selfassessmenttracker
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
